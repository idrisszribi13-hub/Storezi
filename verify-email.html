<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZI Store - تأكيد البريد الإلكتروني</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a1a3e;
            border: 1px solid #2a2a5a;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }
        .icon.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #a0a0c0;
            opacity: 0.6;
            margin-bottom: 20px;
        }
        .status-box {
            background: #0a0a1a;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a2a5a;
            margin-bottom: 20px;
        }
        .status-box.success {
            border-color: #34d399;
        }
        .status-box.error {
            border-color: #f87171;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.4);
        }
        .btn-success {
            background: #34d399;
            color: #0a0a1a;
        }
        .btn-success:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(52, 211, 153, 0.4);
        }
        .btn-danger {
            background: #f87171;
            color: #0a0a1a;
        }
        .btn-danger:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(248, 113, 113, 0.4);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #2a2a5a;
            color: #a0a0c0;
        }
        .btn-outline:hover {
            border-color: #6c5ce7;
            color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .loader-ring {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #2a2a5a;
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 8px auto;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #a0a0c0;
            opacity: 0.3;
        }
        .footer a {
            color: #6c5ce7;
            text-decoration: none;
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- سيتم تحديث المحتوى بواسطة JavaScript -->
        <div id="content">
            <div class="loader-ring"></div>
            <div class="title" style="margin-top:12px;">جاري التحقق...</div>
            <div class="subtitle">يرجى الانتظار أثناء تأكيد بريدك الإلكتروني</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { 
            getAuth, 
            applyActionCode, 
            checkActionCode,
            verifyPasswordResetCode,
            confirmPasswordReset
        } from "firebase/auth";

        // ============================================================
        // إعدادات Firebase (نفس إعدادات المشروع)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBwDTCxzd6aoue-NTLI2u4ouK-M37alwUw",
            authDomain: "zi-script-store.firebaseapp.com",
            projectId: "zi-script-store",
            storageBucket: "zi-script-store.firebasestorage.app",
            messagingSenderId: "925432917209",
            appId: "1:925432917209:web:ee9b329911d95d831622c8",
            measurementId: "G-J8YFD51CMR"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ============================================================
        // الحصول على معاملات URL
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const oobCode = urlParams.get('oobCode');
        const apiKey = urlParams.get('apiKey');
        const lang = urlParams.get('lang') || 'ar';

        // ============================================================
        // عناصر DOM
        // ============================================================
        const content = document.getElementById('content');

        // ============================================================
        // دوال عرض الحالات
        // ============================================================
        function showLoading() {
            content.innerHTML = `
                <div class="loader-ring"></div>
                <div class="title" style="margin-top:12px;">جاري التحقق...</div>
                <div class="subtitle">يرجى الانتظار أثناء تأكيد بريدك الإلكتروني</div>
            `;
        }

        function showSuccess(email) {
            content.innerHTML = `
                <span class="icon">✅</span>
                <div class="title">تم تأكيد البريد الإلكتروني!</div>
                <div class="subtitle">${email ? `تم تأكيد البريد الإلكتروني <strong>${email}</strong> بنجاح.` : 'تم تأكيد بريدك الإلكتروني بنجاح.'}</div>
                <div class="status-box success">
                    <i class="fas fa-check-circle" style="color:#34d399; font-size:20px;"></i>
                    <span style="color:#34d399; font-weight:600; margin-left:8px;">✅ تم التحقق</span>
                </div>
                <div class="btn-group">
                    <a href="index.html" class="btn btn-success">
                        <i class="fas fa-home"></i> العودة إلى المتجر
                    </a>
                    <a href="index.html" class="btn btn-outline" onclick="window.close()">
                        <i class="fas fa-times"></i> إغلاق
                    </a>
                </div>
                <div class="footer">
                    يمكنك الآن تسجيل الدخول والاستفادة من جميع ميزات ZI Store
                </div>
            `;
        }

        function showError(message) {
            content.innerHTML = `
                <span class="icon">❌</span>
                <div class="title">حدث خطأ</div>
                <div class="subtitle">تعذر تأكيد البريد الإلكتروني</div>
                <div class="status-box error">
                    <i class="fas fa-exclamation-circle" style="color:#f87171; font-size:20px;"></i>
                    <span style="color:#f87171; font-weight:600; margin-left:8px;">${message || 'الرابط غير صالح أو منتهي الصلاحية'}</span>
                </div>
                <div class="btn-group">
                    <a href="index.html" class="btn btn-primary">
                        <i class="fas fa-home"></i> العودة إلى المتجر
                    </a>
                    <a href="index.html" class="btn btn-outline" onclick="window.close()">
                        <i class="fas fa-times"></i> إغلاق
                    </a>
                </div>
                <div class="footer">
                    إذا استمرت المشكلة، يرجى التواصل مع الدعم الفني
                </div>
            `;
        }

        function showEmailSent(email) {
            content.innerHTML = `
                <span class="icon">📧</span>
                <div class="title">تم إرسال رابط التأكيد</div>
                <div class="subtitle">تم إرسال رابط تأكيد البريد الإلكتروني إلى <strong>${email || 'بريدك الإلكتروني'}</strong></div>
                <div class="status-box success">
                    <i class="fas fa-check-circle" style="color:#34d399; font-size:20px;"></i>
                    <span style="color:#34d399; font-weight:600; margin-left:8px;">✅ تم الإرسال</span>
                </div>
                <div class="btn-group">
                    <a href="index.html" class="btn btn-success">
                        <i class="fas fa-home"></i> العودة إلى المتجر
                    </a>
                    <a href="index.html" class="btn btn-outline" onclick="window.close()">
                        <i class="fas fa-times"></i> إغلاق
                    </a>
                </div>
                <div class="footer">
                    يرجى التحقق من صندوق الوارد (أو مجلد البريد غير المرغوب فيه)
                </div>
            `;
        }

        function showResetPassword(email) {
            content.innerHTML = `
                <span class="icon">🔑</span>
                <div class="title">إعادة تعيين كلمة المرور</div>
                <div class="subtitle">قم بتعيين كلمة مرور جديدة لحسابك</div>
                <div style="background:var(--bg); border-radius:12px; padding:16px; border:1px solid var(--border); margin-bottom:16px;">
                    <div style="margin-bottom:12px; text-align:left;">
                        <label style="display:block; font-size:12px; font-weight:600; color:#a0a0c0; opacity:0.6; margin-bottom:4px;">كلمة المرور الجديدة</label>
                        <input type="password" id="newPassword" placeholder="••••••••" style="width:100%; padding:10px 14px; border:2px solid #2a2a5a; border-radius:8px; background:#0a0a1a; color:#fff; font-size:14px; outline:none; transition:0.3s;" />
                    </div>
                    <div style="text-align:left;">
                        <label style="display:block; font-size:12px; font-weight:600; color:#a0a0c0; opacity:0.6; margin-bottom:4px;">تأكيد كلمة المرور</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" style="width:100%; padding:10px 14px; border:2px solid #2a2a5a; border-radius:8px; background:#0a0a1a; color:#fff; font-size:14px; outline:none; transition:0.3s;" />
                    </div>
                </div>
                <div id="resetError" style="color:#f87171; font-size:13px; margin-bottom:8px; display:none;"></div>
                <div class="btn-group">
                    <button id="resetBtn" class="btn btn-primary" style="width:100%;">
                        <i class="fas fa-key"></i> إعادة تعيين كلمة المرور
                    </button>
                </div>
                <div class="footer">
                    تأكد من أن كلمة المرور لا تقل عن 6 أحرف
                </div>
            `;

            // معالج زر إعادة التعيين
            document.getElementById('resetBtn').addEventListener('click', async function() {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const errorEl = document.getElementById('resetError');

                if (!newPassword || !confirmPassword) {
                    errorEl.textContent = '⚠️ الرجاء إدخال كلمة المرور الجديدة';
                    errorEl.style.display = 'block';
                    return;
                }
                if (newPassword.length < 6) {
                    errorEl.textContent = '⚠️ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                    errorEl.style.display = 'block';
                    return;
                }
                if (newPassword !== confirmPassword) {
                    errorEl.textContent = '⚠️ كلمات المرور غير متطابقة';
                    errorEl.style.display = 'block';
                    return;
                }

                errorEl.style.display = 'none';
                this.disabled = true;
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحديث...';

                try {
                    await confirmPasswordReset(auth, oobCode, newPassword);
                    content.innerHTML = `
                        <span class="icon">✅</span>
                        <div class="title">تم إعادة تعيين كلمة المرور!</div>
                        <div class="subtitle">تم تحديث كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.</div>
                        <div class="status-box success">
                            <i class="fas fa-check-circle" style="color:#34d399; font-size:20px;"></i>
                            <span style="color:#34d399; font-weight:600; margin-left:8px;">✅ تم التحديث</span>
                        </div>
                        <div class="btn-group">
                            <a href="index.html" class="btn btn-success">
                                <i class="fas fa-home"></i> العودة إلى المتجر
                            </a>
                        </div>
                        <div class="footer">يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة</div>
                    `;
                } catch (error) {
                    errorEl.textContent = '❌ ' + error.message;
                    errorEl.style.display = 'block';
                    this.disabled = false;
                    this.innerHTML = '<i class="fas fa-key"></i> إعادة تعيين كلمة المرور';
                }
            });
        }

        // ============================================================
        // معالجة الرابط
        // ============================================================
        async function handleAction() {
            showLoading();

            // إذا لم يكن هناك oobCode، نعرض رسالة خطأ
            if (!oobCode) {
                showError('رابط غير صالح');
                return;
            }

            try {
                // التحقق من نوع الإجراء
                const actionInfo = await checkActionCode(auth, oobCode);
                const actionData = actionInfo.data;

                // معالجة حسب نوع الإجراء
                if (mode === 'verifyEmail') {
                    // تأكيد البريد الإلكتروني
                    await applyActionCode(auth, oobCode);
                    showSuccess(actionData.email);
                } else if (mode === 'resetPassword') {
                    // إعادة تعيين كلمة المرور
                    showResetPassword(actionData.email);
                } else if (mode === 'recoverEmail') {
                    // استعادة البريد الإلكتروني (نادر الاستخدام)
                    await applyActionCode(auth, oobCode);
                    showSuccess('تم استعادة البريد الإلكتروني بنجاح');
                } else {
                    // إجراء غير معروف
                    showError('نوع الإجراء غير معروف');
                }
            } catch (error) {
                console.error('Verification error:', error);
                if (error.code === 'auth/invalid-action-code') {
                    showError('الرابط غير صالح أو منتهي الصلاحية. يرجى طلب رابط تأكيد جديد.');
                } else if (error.code === 'auth/expired-action-code') {
                    showError('انتهت صلاحية الرابط. يرجى طلب رابط تأكيد جديد.');
                } else {
                    showError(error.message || 'حدث خطأ أثناء التحقق');
                }
            }
        }

        // ============================================================
        // تنفيذ المعالجة
        // ============================================================
        handleAction();

    </script>
</body>
</html>
