<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZI Store - Product</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #ffffff;
            min-height: 100vh;
        }

        /* ========== HEADER ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 26, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #fff;
        }
        .header .logo img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }
        .header .logo span {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .search-box {
            flex: 1;
            max-width: 400px;
            min-width: 150px;
            position: relative;
        }
        .header .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .header .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .header .search-box input:focus {
            border-color: #6c5ce7;
            background: rgba(255, 255, 255, 0.08);
        }
        .header .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
        }
        .header .actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .actions button,
        .header .actions a {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            position: relative;
        }
        .header .actions button:hover,
        .header .actions a:hover {
            background: rgba(108, 92, 231, 0.2);
            color: #fff;
        }
        .header .actions .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            font-size: 9px;
            font-weight: 700;
            background: #6c5ce7;
            color: #fff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header .user-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ========== PRODUCT PAGE ========== */
        .product-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }

        .product-image {
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
        }
        .product-image img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }
        .product-image .badge-top {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0a0a1a;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .product-info .verified {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
            padding: 4px 14px;
            border-radius: 20px;
            width: fit-content;
        }
        .product-info h1 {
            font-size: 28px;
            font-weight: 800;
        }
        .product-info .price {
            font-size: 32px;
            font-weight: 900;
            color: #6c5ce7;
        }
        .product-info .price .original {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: line-through;
            margin-right: 12px;
            font-weight: 400;
        }
        .product-info .description {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.8;
            font-size: 15px;
        }
        .product-info .features {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .product-info .features li {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }
        .product-info .features li i {
            color: #34d399;
            font-size: 16px;
        }

        .product-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .product-actions .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .product-actions .btn-primary {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            flex: 1;
            justify-content: center;
        }
        .product-actions .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
        }
        .product-actions .btn-outline {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }
        .product-actions .btn-outline:hover {
            border-color: #6c5ce7;
            color: #fff;
        }
        .product-actions .btn-heart {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-actions .btn-heart:hover {
            border-color: #e84393;
            color: #e84393;
        }
        .product-actions .btn-heart.liked {
            border-color: #e84393;
            color: #e84393;
            background: rgba(232, 67, 147, 0.1);
        }

        /* ========== GOOGLE LOGIN BUTTON ========== */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: #fff;
            color: #1a1a2e;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 280px;
            position: relative;
            overflow: hidden;
        }
        .google-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.05), rgba(234, 67, 53, 0.05));
            opacity: 0;
            transition: 0.3s;
        }
        .google-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }
        .google-btn:hover::before {
            opacity: 1;
        }
        .google-btn:active {
            transform: scale(0.97);
        }
        .google-btn .google-icon {
            width: 24px;
            height: 24px;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .google-btn .google-icon svg {
            width: 24px;
            height: 24px;
        }
        .google-btn .btn-text {
            position: relative;
            z-index: 1;
            font-size: 14px;
        }
        .google-btn .btn-loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #4285F4;
            animation: spin 0.8s linear infinite;
            position: relative;
            z-index: 1;
        }
        .google-btn.loading .btn-text {
            display: none;
        }
        .google-btn.loading .btn-loader {
            display: block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 600px) {
            .header {
                padding: 8px 12px;
            }
            .header .logo span {
                font-size: 16px;
            }
            .header .search-box {
                min-width: 100px;
                order: 3;
                flex: 0 0 100%;
            }
            .header .search-box input {
                padding: 8px 12px 8px 32px;
                font-size: 13px;
            }
            .header .actions button,
            .header .actions a {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }
            .product-info h1 {
                font-size: 22px;
            }
            .product-info .price {
                font-size: 26px;
            }
            .product-info .features {
                grid-template-columns: 1fr;
            }
            .product-actions .btn {
                padding: 12px 20px;
                font-size: 14px;
            }
            .product-image img {
                height: 220px;
            }
        }

        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(26, 26, 62, 0.95);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 14px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 99999;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .toast .toast-icon {
            font-size: 20px;
            color: #34d399;
        }
        .toast .toast-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- ========== HEADER ========== -->
    <header class="header">
        <a href="index.html" class="logo">
            <img src="favicon.png" alt="ZI Store" />
            <span>ZI Store</span>
        </a>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search products..." id="searchInput" />
        </div>

        <div class="actions">
            <button onclick="openWishlist()" title="Favorites">
                <i class="fas fa-heart"></i>
                <span class="badge" id="wishlistBadge">0</span>
            </button>
            <button onclick="openCart()" title="Cart">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge" id="cartBadge">0</span>
            </button>
            <button class="user-btn" onclick="openProfile()" id="userBtn">U</button>
        </div>
    </header>

    <!-- ========== PRODUCT PAGE ========== -->
    <div class="product-page">
        <div class="product-grid" id="productContainer">
            <!-- Product will be loaded here -->
            <div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3);grid-column:1/-1;">
                <i class="fas fa-spinner fa-spin" style="font-size:40px;"></i>
                <p style="margin-top:12px;">Loading product...</p>
            </div>
        </div>
    </div>

    <!-- ========== TOAST ========== -->
    <div class="toast" id="toast">
        <span class="toast-icon"><i class="fas fa-check-circle"></i></span>
        <span id="toastMessage">Success!</span>
        <button class="toast-close" onclick="hideToast()"><i class="fas fa-times"></i></button>
    </div>

    <!-- ============================================ -->
    <!-- Firebase Import Map -->
    <!-- ============================================ -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <!-- ============================================ -->
    <!-- Firebase Initialization & Google Login -->
    <!-- ============================================ -->
    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "firebase/auth";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "firebase/firestore";

        // ============================================
        // Firebase Configuration (نفس إعدادات مشروعك)
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyBwDTCxzd6aoue-NTLI2u4ouK-M37alwUw",
            authDomain: "zi-script-store.firebaseapp.com",
            projectId: "zi-script-store",
            storageBucket: "zi-script-store.firebasestorage.app",
            messagingSenderId: "925432917209",
            appId: "1:925432917209:web:ee9b329911d95d831622c8",
            measurementId: "G-J8YFD51CMR"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        console.log('✅ Firebase initialized in product.html');

        // ============================================
        // PRODUCT DATA
        // ============================================
        const defaultProduct = {
            id: 'survive-idle-run',
            name: 'Survive Idle Run',
            badge: 'VIP',
            price: 29.99,
            originalPrice: 49.99,
            currency: '$',
            image: 'https://via.placeholder.com/600x350/1a1a3e/6c5ce7?text=Survive+Idle+Run',
            description: 'No description available.',
            verified: true,
            features: ['Gems Hack', 'Ticket Hack', 'Autokill', 'AutoWin', 'Speed'],
            video: 'https://www.youtube.com/embed/dQw4w9WgXcQ'
        };

        // ============================================
        // RENDER PRODUCT
        // ============================================
        function renderProduct(product) {
            const container = document.getElementById('productContainer');

            const featuresHTML = product.features ? product.features.map(f =>
                `<li><i class="fas fa-check-circle"></i> ${f}</li>`
            ).join('') : '';

            container.innerHTML = `
                <div class="product-image">
                    <img src="${product.image || 'https://via.placeholder.com/600x350/1a1a3e/6c5ce7?text=No+Image'}" alt="${product.name}" />
                    <span class="badge-top">${product.badge || 'PRODUCT'}</span>
                </div>
                <div class="product-info">
                    ${product.verified ? `<span class="verified"><i class="fas fa-check-circle"></i> 100% VERIFIED WORKING PRODUCT</span>` : ''}
                    <h1>${product.name}</h1>
                    <div class="price">
                        ${product.currency || '$'}${(product.price || 0).toFixed(2)}
                        ${product.originalPrice ? `<span class="original">${product.currency || '$'}${product.originalPrice.toFixed(2)}</span>` : ''}
                    </div>
                    <p class="description">${product.description || 'No description available.'}</p>
                    <ul class="features">${featuresHTML}</ul>
                    <div class="product-actions">
                        <button class="btn btn-primary" onclick="window.addToCart()">
                            <i class="fas fa-cart-plus"></i> Add to Cart
                        </button>
                        <button class="btn btn-outline" onclick="window.buyNow()">
                            <i class="fas fa-bolt"></i> Buy Now
                        </button>
                        <button class="btn-heart" id="heartBtn" onclick="window.toggleLike()">
                            <i class="fas fa-heart"></i>
                        </button>
                    </div>

                    <!-- ====== GOOGLE LOGIN BUTTON ====== -->
                    <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.05);padding-top:16px;">
                        <p style="font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:10px;">Sign in to save your purchase history</p>
                        <button class="google-btn" id="googleLoginBtn">
                            <span class="google-icon">
                                <svg viewBox="0 0 48 48">
                                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                                </svg>
                            </span>
                            <span class="btn-text" id="googleBtnText">Sign in with Google</span>
                            <span class="btn-loader"></span>
                        </button>
                    </div>
                </div>
            `;

            // Add click listener to Google button
            document.getElementById('googleLoginBtn').addEventListener('click', window.loginWithGoogle);

            // Update user button
            window.updateUserButton();
        }

        // ============================================
        // USER STATE
        // ============================================
        window.currentUser = null;

        window.updateUserButton = function() {
            const btn = document.getElementById('userBtn');
            const googleBtnText = document.getElementById('googleBtnText');
            if (window.currentUser) {
                const name = window.currentUser.displayName || window.currentUser.email || 'User';
                btn.textContent = name.charAt(0).toUpperCase();
                btn.style.background = 'linear-gradient(135deg, #34d399, #6c5ce7)';
                if (googleBtnText) googleBtnText.textContent = '✅ Signed in as ' + name;
                // تحديث زر Google
                const googleBtn = document.getElementById('googleLoginBtn');
                if (googleBtn) {
                    googleBtn.style.background = 'rgba(52, 211, 153, 0.1)';
                    googleBtn.style.border = '2px solid #34d399';
                }
            } else {
                btn.textContent = 'U';
                btn.style.background = 'linear-gradient(135deg, #6c5ce7, #a29bfe)';
                if (googleBtnText) googleBtnText.textContent = 'Sign in with Google';
                const googleBtn = document.getElementById('googleLoginBtn');
                if (googleBtn) {
                    googleBtn.style.background = '#fff';
                    googleBtn.style.border = 'none';
                }
            }
        };

        // ============================================
        // GOOGLE LOGIN WITH FIREBASE
        // ============================================
        window.loginWithGoogle = function() {
            const btn = document.getElementById('googleLoginBtn');
            btn.classList.add('loading');
            const provider = new GoogleAuthProvider();

            signInWithPopup(auth, provider)
                .then((result) => {
                    btn.classList.remove('loading');
                    window.currentUser = result.user;
                    window.updateUserButton();
                    window.showToast('✅ Signed in with Google!');
                    
                    // تحديث واجهة المستخدم
                    const googleBtnText = document.getElementById('googleBtnText');
                    if (googleBtnText) googleBtnText.textContent = '✅ Signed in as ' + (result.user.displayName || result.user.email);
                    const googleBtn = document.getElementById('googleLoginBtn');
                    if (googleBtn) {
                        googleBtn.style.background = 'rgba(52, 211, 153, 0.1)';
                        googleBtn.style.border = '2px solid #34d399';
                    }
                })
                .catch((error) => {
                    btn.classList.remove('loading');
                    console.error('Google login error:', error);
                    window.showToast('❌ ' + error.message);
                });
        };

        // ============================================
        // MONITOR AUTH STATE
        // ============================================
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                window.updateUserButton();
                // تحديث زر Google
                const googleBtnText = document.getElementById('googleBtnText');
                if (googleBtnText) googleBtnText.textContent = '✅ Signed in as ' + (user.displayName || user.email);
                const googleBtn = document.getElementById('googleLoginBtn');
                if (googleBtn) {
                    googleBtn.style.background = 'rgba(52, 211, 153, 0.1)';
                    googleBtn.style.border = '2px solid #34d399';
                }
            } else {
                window.currentUser = null;
                window.updateUserButton();
            }
        });

        // ============================================
        // LOAD PRODUCT FROM FIRESTORE
        // ============================================
        async function loadProduct(productId) {
            try {
                const productRef = doc(db, 'products', productId);
                const productSnap = await getDoc(productRef);
                
                if (productSnap.exists()) {
                    const data = productSnap.data();
                    const product = {
                        id: productId,
                        name: data.name || 'Unnamed Product',
                        badge: data.badge || 'PRODUCT',
                        price: data.price || 0,
                        originalPrice: data.originalPrice || null,
                        currency: data.currency || '$',
                        image: data.image || 'https://via.placeholder.com/600x350/1a1a3e/6c5ce7?text=No+Image',
                        description: data.description || 'No description available.',
                        verified: data.verified !== false,
                        features: data.features || [],
                        video: data.video || null
                    };
                    renderProduct(product);
                } else {
                    // Use default product if not found
                    renderProduct(defaultProduct);
                    window.showToast('⚠️ Product not found, showing demo');
                }
            } catch (error) {
                console.error('Error loading product:', error);
                renderProduct(defaultProduct);
                window.showToast('⚠️ Error loading product, showing demo');
            }
        }

        // ============================================
        // ACTIONS
        // ============================================
        window.addToCart = function() {
            window.showToast('🛒 Added to cart!');
        };

        window.buyNow = function() {
            if (window.currentUser) {
                window.showToast('💳 Redirecting to checkout...');
            } else {
                window.showToast('🔑 Please sign in first!');
            }
        };

        window.toggleLike = function() {
            const btn = document.getElementById('heartBtn');
            btn.classList.toggle('liked');
            if (btn.classList.contains('liked')) {
                window.showToast('❤️ Added to favorites!');
            } else {
                window.showToast('💔 Removed from favorites');
            }
        };

        window.openWishlist = function() {
            window.showToast('❤️ Wishlist opened');
        };

        window.openCart = function() {
            window.showToast('🛒 Cart opened');
        };

        window.openProfile = function() {
            if (window.currentUser) {
                window.showToast(`👋 Hello, ${window.currentUser.displayName || window.currentUser.email}!`);
            } else {
                window.showToast('🔑 Please sign in');
            }
        };

        // ============================================
        // TOAST
        // ============================================
        window.showToast = function(message) {
            const toast = document.getElementById('toast');
            const messageEl = document.getElementById('toastMessage');
            messageEl.textContent = message;
            toast.classList.add('show');
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        };

        window.hideToast = function() {
            const toast = document.getElementById('toast');
            toast.classList.remove('show');
        };

        // ============================================
        // SEARCH
        // ============================================
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    window.showToast(`🔍 Searching for "${query}"...`);
                    // Redirect to index.html with search query
                    window.location.href = `index.html?search=${encodeURIComponent(query)}`;
                }
            }
        });

        // ============================================
        // INIT
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id') || 'survive-idle-run';

        // Load product from Firebase
        loadProduct(productId);

        console.log('✅ Product page loaded with Firebase');
        console.log('🔑 Product ID:', productId);
    </script>

</body>
    </html>
